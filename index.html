    // ================= 2. 元素單字卡測驗 (關卡一) =================
    function ElementQuiz() {
      const [questions, setQuestions] = useState([]);
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [feedback, setFeedback] = useState(null);

      const initQuiz = () => {
        const newQs = [];
        for (let i = 0; i < 10; i++) {
          const target = allElements[Math.floor(Math.random() * allElements.length)];
          const askSymbol = Math.random() > 0.5;
          let options = new Set([askSymbol ? target.s : target.n]);
          while(options.size < 4) {
             const randomEl = allElements[Math.floor(Math.random() * allElements.length)];
             options.add(askSymbol ? randomEl.s : randomEl.n);
          }
          const optionsArr = Array.from(options).sort(() => 0.5 - Math.random());
          newQs.push({
            targetDisplay: askSymbol ? target.n : target.s,
            qText: askSymbol ? `請選出「${target.n}」的英文符號` : `請問「${target.s}」是哪一個中文元素？`,
            options: optionsArr,
            ans: optionsArr.indexOf(askSymbol ? target.s : target.n),
            hint: `${target.s} = ${target.n} (${target.b})`
          });
        }
        setQuestions(newQs);
        setCurrentQ(0);
        setScore(0);
        setShowResult(false);
        setFeedback(null);
      };

      useEffect(() => { initQuiz(); }, []);

      const handleAnswer = (index) => {
        if (feedback) return;
        const isCorrect = index === questions[currentQ].ans;
        if (isCorrect) setScore(score + 1);
        setFeedback({
          correct: isCorrect,
          text: isCorrect ? '✅ 答對了！' : `❌ 答錯了。正確答案是 ${questions[currentQ].options[questions[currentQ].ans]}。`,
          hint: questions[currentQ].hint
        });
        setTimeout(() => {
          setFeedback(null);
          if (currentQ + 1 < questions.length) setCurrentQ(currentQ + 1);
          else setShowResult(true);
        }, 2000);
      };

      if (questions.length === 0) return <div>載入中...</div>;
      if (showResult) {
        return (
          <div className="text-center py-10 animate-fade-in">
            <h2 className="text-2xl md:text-3xl font-bold mb-4">單字卡測驗結束！</h2>
            <p className="text-xl md:text-2xl mb-8">你的得分：<span className="text-amber-600 font-black text-3xl md:text-4xl">{score}</span> / {questions.length}</p>
            <button onClick={initQuiz} className="bg-amber-500 text-white px-6 py-3 md:px-8 md:py-4 rounded-xl font-bold text-lg md:text-xl hover:bg-amber-600 shadow-md transition transform hover:scale-105">
              🔄 隨機換下一批單字卡
            </button>
          </div>
        );
      }
      const q = questions[currentQ];
      return (
        <div className="max-w-2xl mx-auto py-2 md:py-4 animate-fade-in">
          <div className="flex justify-between items-center mb-4 bg-gray-100 p-3 md:p-4 rounded-xl">
            <div className="text-xs md:text-sm text-gray-500 font-bold">進度：{currentQ + 1} / {questions.length} 題</div>
            <div className="text-xs md:text-sm text-amber-600 font-bold">目前得分：{score}</div>
          </div>
          
          <div className="bg-amber-50 border-4 border-amber-300 p-8 md:p-12 rounded-2xl md:rounded-3xl my-4 md:my-6 shadow-md text-center">
            <div className="text-base md:text-lg font-bold text-amber-600 mb-3 md:mb-4">{q.qText}</div>
            <h2 className="text-5xl md:text-7xl font-black text-gray-800 tracking-wider drop-shadow-sm">{q.targetDisplay}</h2>
          </div>
          
          {/* 修改這裡：將「答對/答錯」提示框，移到選項的正上方，並且避免彈跳動畫 */}
          {feedback && (
            <div className={`mb-4 md:mb-6 p-3 md:p-4 rounded-xl border-2 animate-fade-in shadow-sm ${feedback.correct ? 'bg-green-100 border-green-400 text-green-800' : 'bg-red-100 border-red-400 text-red-800'}`}>
              <div className="font-bold text-lg md:text-xl mb-1">{feedback.text}</div>
              <div className="text-sm md:text-md mt-1">💡 記憶提示：{feedback.hint}</div>
            </div>
          )}

          <div className="grid grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-6">
            {q.options.map((opt, idx) => (
              <button key={idx} onClick={() => handleAnswer(idx)} disabled={!!feedback} className={`p-4 md:p-6 text-xl md:text-3xl font-bold rounded-2xl border-2 transition-all ${feedback && idx === q.ans ? 'bg-green-200 border-green-500 shadow-lg transform scale-105' : feedback && idx !== q.ans ? 'bg-gray-100 border-gray-200 text-gray-400 opacity-50' : 'bg-white border-amber-200 text-gray-700 hover:bg-amber-50 hover:shadow-md'}`}>
                {opt}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ================= 3. 化合物配對 (關卡二) =================
    function CompoundGame() {
      const [cat, setCat] = useState(cations[0]);
      const [an, setAn] = useState(anions[0]);
      const [inputCat, setInputCat] = useState('');
      const [inputAn, setInputAn] = useState('');
      const [message, setMessage] = useState(null);

      const newQuestion = () => {
        setCat(cations[Math.floor(Math.random() * cations.length)]);
        setAn(anions[Math.floor(Math.random() * anions.length)]);
        setInputCat('');
        setInputAn('');
        setMessage(null);
      };

      useEffect(() => { newQuestion(); }, []);

      const checkAnswer = () => {
        const x = parseInt(inputCat);
        const y = parseInt(inputAn);
        if (isNaN(x) || isNaN(y) || x <= 0 || y <= 0) {
          setMessage({ type: 'error', text: '請輸入大於 0 的正整數喔！' }); return;
        }
        const totalCharge = (x * cat.charge) + (y * an.charge);
        const d = gcd(x, y);
        if (totalCharge === 0) {
          if (d === 1) setMessage({ type: 'success', text: `🎉 完美！ ${x}×(+${cat.charge}) + ${y}×(${an.charge}) = 0。` });
          else setMessage({ type: 'warning', text: `🤔 電荷平衡了，但不是最簡整數比喔！試試約分除以 ${d}。` });
        } else {
          setMessage({ type: 'error', text: `💥 不平衡喔！目前總電荷為 ${totalCharge > 0 ? '+' : ''}${totalCharge}。` });
        }
      };

      return (
        <div className="py-4 md:py-6 animate-fade-in text-center">
          <div className="mb-6 md:mb-8">
            <h2 className="text-xl md:text-2xl font-bold text-indigo-800 mb-2">⚖️ 組合化合物 (價數和為零)</h2>
            <p className="text-sm md:text-base text-gray-600">需要幾個陽離子和陰離子，才能讓「總電荷」為 0 呢？(請寫最簡整數比)</p>
          </div>
          
          <div className="flex flex-col sm:flex-row justify-center items-center gap-4 sm:gap-6 mb-6 md:mb-8">
            <div className="bg-red-50 border-2 sm:border-4 border-red-300 p-4 sm:p-6 rounded-2xl w-full sm:w-48 text-center shadow-lg">
              <div className="text-3xl sm:text-4xl font-bold text-red-600 mb-2">{renderIon(cat)}</div>
              <div className="text-xs sm:text-sm font-bold text-red-800">{cat.name}</div>
              <div className="mt-4">
                <input type="number" min="1" value={inputCat} onChange={(e) => setInputCat(e.target.value)} placeholder="數量" className="w-16 sm:w-24 p-2 text-center text-lg sm:text-xl font-bold rounded border-2 border-red-300" />
                <span className="ml-2 font-bold text-sm sm:text-base text-gray-500">個</span>
              </div>
            </div>
            <div className="text-4xl sm:text-5xl font-black text-gray-300">+</div>
            <div className="bg-blue-50 border-2 sm:border-4 border-blue-300 p-4 sm:p-6 rounded-2xl w-full sm:w-48 text-center shadow-lg">
              <div className="text-3xl sm:text-4xl font-bold text-blue-600 mb-2">{renderIon(an)}</div>
              <div className="text-xs sm:text-sm font-bold text-blue-800">{an.name}</div>
              <div className="mt-4">
                <input type="number" min="1" value={inputAn} onChange={(e) => setInputAn(e.target.value)} placeholder="數量" className="w-16 sm:w-24 p-2 text-center text-lg sm:text-xl font-bold rounded border-2 border-blue-300" />
                <span className="ml-2 font-bold text-sm sm:text-base text-gray-500">個</span>
              </div>
            </div>
          </div>
          
          {/* 修改這裡：將提示框移到按鈕正上方 */}
          {message && (
            <div className={`mb-6 max-w-md mx-auto p-3 sm:p-4 rounded-xl font-bold border-2 text-sm sm:text-base animate-fade-in ${message.type === 'success' ? 'bg-green-100 border-green-500 text-green-800' : message.type === 'warning' ? 'bg-yellow-100 border-yellow-500 text-yellow-800' : 'bg-red-100 border-red-500 text-red-800'}`}>
              {message.text}
            </div>
          )}

          <div className="space-y-3 sm:space-y-0 sm:space-x-4 mb-6 flex flex-col sm:flex-row justify-center items-center">
            <button onClick={checkAnswer} className="w-full sm:w-auto bg-green-500 text-white px-6 py-3 sm:px-8 sm:py-3 rounded-xl font-bold text-lg sm:text-xl hover:bg-green-600 shadow transition">送出檢查 ✅</button>
            {message && message.type === 'success' && <button onClick={newQuestion} className="w-full sm:w-auto bg-indigo-600 text-white px-6 py-3 sm:px-8 sm:py-3 rounded-xl font-bold text-lg sm:text-xl hover:bg-indigo-700 shadow transition">下一題 ➡️</button>}
          </div>
        </div>
      );
    }

    // ================= 4. 陰陽離子分類賽 (關卡二) =================
    function IonSortGame() {
      const allIons = [...cations, ...anions];
      const [currentIon, setCurrentIon] = useState(allIons[0]);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [feedback, setFeedback] = useState(null);

      const nextIon = () => { setCurrentIon(allIons[Math.floor(Math.random() * allIons.length)]); setFeedback(null); };
      useEffect(() => { nextIon(); }, []);

      const handleSort = (type) => {
        if (feedback) return;
        const isCation = currentIon.charge > 0;
        const correct = (type === 'cation' && isCation) || (type === 'anion' && !isCation);
        if (correct) {
          setScore(score + 10); setStreak(streak + 1);
          setFeedback({ correct: true, text: `✅ 正確！${currentIon.name} 是${isCation ? '陽' : '陰'}離子。` });
        } else {
          setStreak(0);
          setFeedback({ correct: false, text: `❌ 錯誤！帶有 ${currentIon.chargeStr} 電荷的是${isCation ? '陽' : '陰'}離子。` });
        }
        setTimeout(nextIon, 1500);
      };

      return (
        <div className="py-4 md:py-6 text-center max-w-lg mx-auto animate-fade-in">
          <div className="flex justify-between items-center mb-4 md:mb-6 bg-gray-100 p-3 md:p-4 rounded-xl font-bold">
            <div className="text-base md:text-xl text-indigo-700">分數: {score}</div>
            <div className="text-base md:text-xl text-orange-500">🔥 連勝: {streak}</div>
          </div>
          
          <div className="bg-white border-2 md:border-4 border-dashed border-indigo-200 p-8 md:p-10 rounded-2xl md:rounded-3xl my-6 md:my-8 shadow-sm">
            <div className="text-5xl md:text-6xl font-black text-gray-800 mb-2">{renderIon(currentIon)}</div>
            <div className="text-lg md:text-xl text-gray-600 font-bold">{currentIon.name}</div>
          </div>
          
          {/* 修改這裡：將提示框移到按鈕正上方 */}
          {feedback && <div className={`mb-4 md:mb-6 p-3 md:p-4 rounded-xl font-bold text-base md:text-lg animate-fade-in ${feedback.correct ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{feedback.text}</div>}

          <div className="grid grid-cols-2 gap-3 md:gap-6">
            <button onClick={() => handleSort('cation')} className="bg-red-100 hover:bg-red-200 border-2 md:border-4 border-red-400 text-red-800 font-bold text-lg md:text-2xl py-4 md:py-6 rounded-2xl transition transform hover:scale-105">陽離子<br/><span className="text-xs md:text-sm">(帶正電 +)</span></button>
            <button onClick={() => handleSort('anion')} className="bg-blue-100 hover:bg-blue-200 border-2 md:border-4 border-blue-400 text-blue-800 font-bold text-lg md:text-2xl py-4 md:py-6 rounded-2xl transition transform hover:scale-105">陰離子<br/><span className="text-xs md:text-sm">(帶負電 -)</span></button>
          </div>
        </div>
      );
    }

    // ================= 5. 總合測驗 (關卡三) =================
    function ComprehensiveQuiz({ mode, title, questionsPool, goBack }) {
      const [gameState, setGameState] = useState('setup');
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);

      const startGame = (count) => {
        const shuffled = [...questionsPool].sort(() => 0.5 - Math.random());
        setQuizQuestions(shuffled.slice(0, count));
        setCurrentQ(0); setScore(0); setFeedback(null); setGameState('playing');
      };

      const handleAnswer = (index) => {
        if (feedback) return;
        const isCorrect = index === quizQuestions[currentQ].ans;
        if (isCorrect) setScore(score + 1);
        setFeedback({
          correct: isCorrect,
          text: isCorrect ? '✅ 答對了！' : `❌ 答錯了。正確答案是：${quizQuestions[currentQ].options[quizQuestions[currentQ].ans]}。`,
          hint: quizQuestions[currentQ].hint
        });
        setTimeout(() => {
          setFeedback(null);
          if (currentQ + 1 < quizQuestions.length) setCurrentQ(currentQ + 1);
          else setGameState('result');
        }, 3000);
      };

      if (gameState === 'setup') {
        return (
          <div className="text-center py-6 md:py-10 animate-fade-in max-w-2xl mx-auto">
            <h2 className="text-2xl md:text-3xl font-extrabold mb-3 md:mb-4 text-gray-800">{title}</h2>
            <p className="text-base md:text-lg text-gray-600 mb-6 md:mb-8">題庫中共 {questionsPool.length} 題。請選擇你要挑戰的題數！</p>
            <div className="flex flex-col sm:flex-row justify-center gap-3 md:gap-4">
              <button onClick={() => startGame(10)} className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 sm:px-8 sm:py-4 rounded-xl font-bold text-lg sm:text-xl shadow transform hover:scale-105">挑戰 10 題</button>
              <button onClick={() => startGame(20)} className="bg-teal-500 hover:bg-teal-600 text-white px-6 py-3 sm:px-8 sm:py-4 rounded-xl font-bold text-lg sm:text-xl shadow transform hover:scale-105">挑戰 20 題</button>
              <button onClick={() => startGame(questionsPool.length)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 sm:px-8 sm:py-4 rounded-xl font-bold text-lg sm:text-xl shadow transform hover:scale-105">全部挑戰 ({questionsPool.length} 題)</button>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const percentage = Math.round((score / quizQuestions.length) * 100);
        return (
          <div className="text-center py-6 md:py-10 animate-fade-in max-w-2xl mx-auto">
            <h2 className="text-2xl md:text-3xl font-bold mb-4">測驗結束！</h2>
            <div className="text-5xl md:text-6xl mb-4 md:mb-6">{percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '💪'}</div>
            <p className="text-xl md:text-2xl mb-4 text-gray-700">你的得分：<span className="text-indigo-600 font-black text-3xl md:text-4xl">{score}</span> / {quizQuestions.length}</p>
            <p className="text-lg md:text-xl mb-6 md:mb-8 font-bold text-gray-500">正確率：{percentage}%</p>
            <button onClick={() => setGameState('setup')} className="bg-indigo-600 text-white px-6 py-3 md:px-8 md:py-3 rounded-xl font-bold hover:bg-indigo-700">🔄 重新選擇題數</button>
          </div>
        );
      }

      const q = quizQuestions[currentQ];
      return (
        <div className="max-w-3xl mx-auto py-2 md:py-4 animate-fade-in">
          <div className="flex justify-between items-center mb-4 md:mb-6 bg-gray-100 p-3 md:p-4 rounded-xl">
            <div className="text-sm md:text-lg text-gray-500 font-bold">進度：{currentQ + 1} / {quizQuestions.length}</div>
            <div className="text-sm md:text-lg text-indigo-600 font-bold">目前得分：{score}</div>
          </div>
          <h2 className="text-lg md:text-2xl font-bold mb-4 md:mb-6 text-gray-800 leading-relaxed">{q.q}</h2>
          
          {/* 修改這裡：將提示框移到選項的正上方，並且避免彈跳動畫 */}
          {feedback && (
            <div className={`mb-4 md:mb-6 p-3 md:p-4 rounded-xl border-2 animate-fade-in shadow-sm ${feedback.correct ? 'bg-green-100 border-green-400 text-green-800' : 'bg-red-100 border-red-400 text-red-800'}`}>
              <div className="font-bold text-lg md:text-xl mb-1">{feedback.text}</div>
              <div className="text-sm md:text-md mt-1 md:mt-2">💡 解析：{feedback.hint}</div>
            </div>
          )}

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-6">
            {q.options.map((opt, idx) => (
              <button key={idx} onClick={() => handleAnswer(idx)} disabled={!!feedback} className={`p-4 md:p-5 text-base md:text-lg font-bold rounded-xl border-2 transition-all ${feedback && idx === q.ans ? 'bg-green-200 border-green-500 text-green-900 shadow-md transform scale-105' : feedback && idx !== q.ans ? 'bg-gray-100 border-gray-200 text-gray-400 opacity-60' : 'bg-white border-indigo-200 text-gray-700 hover:bg-indigo-50 hover:shadow'}`}>
                {opt}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // 將 App 渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
